<!DOCTYPE html>
<html>

<head>

    <title>Heart Disease Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>Heart Disease Diagnostic Dashboard</h1>

    <p>Interactive Dashboard using Tableau + Flask</p>

</header>

<nav>

    
    <a href="#">Dashboard</a>
    

</nav>
<div class='tableauPlaceholder' id='vizContainer' style='position: relative'>
    <noscript>
        <a href="#">
            <img alt="Heart Disease Dashboard"
                 src="https://public.tableau.com/static/images/6R/6RN6JBG95/1.png"
                 style="border:none;">
        </a>
    </noscript>

    <object class='tableauViz' style='display:none;'>
        <param name='host_url' value='https://public.tableau.com/' />
        <param name='embed_code_version' value='3' />
        <param name='path' value='shared/6RN6JBG95' />
        <param name='toolbar' value='yes' />
        <param name='language' value='en-US' />
    </object>
</div>

<script type='text/javascript'>
var divElement = document.getElementById('vizContainer');
var vizElement = divElement.getElementsByTagName('object')[0];

vizElement.style.width = '100%';
vizElement.style.height = '900px';

var scriptElement = document.createElement('script');
scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

<footer>

Developed by Team Heart Disease Analysis © 2026

</footer>

</body>
</html>
